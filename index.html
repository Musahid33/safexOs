    <style>
        .custom-scroll::-webkit-scrollbar { display: none; }
        @keyframes pulse-red {
            0%, 100% { background-color: #ef4444; }
            50% { background-color: #991b1b; }
        }
        .emergency-blink { animation: pulse-red 2s infinite; }
        @keyframes scroll-left {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .gallery-scroll {
            display: flex;
            gap: 1rem;
            overflow: hidden;
            white-space: nowrap;
        }
        .gallery-scroll-inner {
            display: flex;
            gap: 1rem;
            animation: scroll-left 30s linear infinite;
        }
        .gallery-scroll-inner:hover {
            animation-play-state: paused;
        }
        .gallery-card {
            min-width: 200px;
            flex-shrink: 0;
        }

        /* ===== THEME SYSTEM ===== */
        :root {
            --theme-bg: #f8fafc;
            --theme-surface: #ffffff;
            --theme-border: #e2e8f0;
            --theme-text: #1e293b;
            --theme-text-secondary: #64748b;
            --theme-header-bg: #0f172a;
            --theme-header-text: #ffffff;
            --theme-footer-bg: #0f172a;
            --theme-footer-text: #94a3b8;
            --theme-card-bg: #ffffff;
            --theme-accent: #10b981;
            --theme-accent-hover: #059669;
            --theme-muted: #f1f5f9;
            --theme-shadow: rgba(0,0,0,0.08);
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        /* 🌙 DARK MODE */
        body.theme-dark {
            --theme-bg: #0f172a;
            --theme-surface: #1e293b;
            --theme-border: #334155;
            --theme-text: #f1f5f9;
            --theme-text-secondary: #94a3b8;
            --theme-header-bg: #020617;
            --theme-header-text: #f1f5f9;
            --theme-footer-bg: #020617;
            --theme-footer-text: #64748b;
            --theme-card-bg: #1e293b;
            --theme-accent: #34d399;
            --theme-accent-hover: #10b981;
            --theme-muted: #1e293b;
            --theme-shadow: rgba(0,0,0,0.3);
        }

        /* 💎 PREMIUM THEME (Royal Gold & Deep Indigo) */
        body.theme-premium {
            --theme-bg: #0f0a1a;
            --theme-surface: #1a1230;
            --theme-border: #3d2e6b;
            --theme-text: #f0e6ff;
            --theme-text-secondary: #b8a3e6;
            --theme-header-bg: #0d0820;
            --theme-header-text: #f0e6ff;
            --theme-footer-bg: #0d0820;
            --theme-footer-text: #8b7ab5;
            --theme-card-bg: #1e1540;
            --theme-accent: #f59e0b;
            --theme-accent-hover: #d97706;
            --theme-muted: #1e1540;
            --theme-shadow: rgba(245,158,11,0.15);
        }

        /* Apply theme variables to body and common elements */
        body { background-color: var(--theme-bg); color: var(--theme-text); }
        body.theme-dark, body.theme-premium { background-color: var(--theme-bg); color: var(--theme-text); }
        .theme-surface { background-color: var(--theme-surface); }
        .theme-border { border-color: var(--theme-border); }
        .theme-card { background-color: var(--theme-card-bg); border-color: var(--theme-border); }
        .theme-muted { background-color: var(--theme-muted); }
        .theme-text-secondary { color: var(--theme-text-secondary); }
        .theme-accent { color: var(--theme-accent); }
        .theme-accent-bg { background-color: var(--theme-accent); }
        .theme-shadow { box-shadow: 0 1px 3px var(--theme-shadow); }

        /* Theme toggle button animation */
        .theme-btn-rotate {
            animation: spin-theme 0.5s ease-in-out;
        }
        @keyframes spin-theme {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
